name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  quality:
    name: Lint, Type Check & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx expo lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Test
        run: npx jest --passWithNoTests
